name: Tests

# 手動トリガ専用。Actions タブの "Run workflow" から実行する。
on:
  workflow_dispatch:
    inputs:
      verbosity:
        description: "dotnet test のログ詳細度"
        type: choice
        default: minimal
        options:
          - quiet
          - minimal
          - normal
          - detailed

env:
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"

jobs:
  test:
    name: Build & integration tests
    runs-on: ubuntu-latest
    # Aspire のコンテナ起動 + イメージ pull を含むので余裕を持たせる
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore SampleApp.slnx

      - name: Build
        run: dotnet build SampleApp.slnx --configuration Release --no-restore

      # Aspire.Hosting.Testing で MySQL / Valkey / ElasticMQ を起動する統合テスト。
      # ソリューション単位でまとめて実行する（テスト時は AppHost が MySQL の永続ボリュームを
      # 無効化するため、並列実行でもボリュームのロック競合は起きない）。
      # --blame-hang-timeout でハング時はダンプして失敗させる。
      - name: Test
        run: >-
          dotnet test SampleApp.slnx
          --configuration Release
          --no-build
          --verbosity ${{ inputs.verbosity }}
          --logger "trx"
          --results-directory ./TestResults
          --blame-hang-timeout 10m
          --blame-hang-dump-type full

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            ./TestResults/**/*.trx
            ./TestResults/**/*.dmp
          if-no-files-found: warn
